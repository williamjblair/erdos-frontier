name: Verify generated Erdős work map

# The work map is a deterministic projection over pinned inputs. It is never a
# second authority: frontier.json and signed Vela events remain canonical.
on:
  push:
    branches: [main]
    paths:
      - ".vela/**"
      - "attack/attempt-ledger.v2.json"
      - "frontier.json"
      - "erdos_frontier.py"
      - "vela.lock"
      - "sources.yaml"
      - "sources.lock.json"
      - "sources/**"
      - "review/developed-campaign-proposals.v1.yaml"
      - "scripts/build_graph.py"
      - "scripts/build_recovered_attempt_ledger.py"
      - "scripts/build_work_inventory.py"
      - "scripts/import_recovered_attempts.py"
      - "graph/**"
      - "site/claim-graph.json"
      - "site/work-index.json"
      - "site/problems/**"
      - "tests/test_formal_conjectures_activity.py"
      - "tests/test_erdos_frontier.py"
      - "tests/test_work_inventory.py"
      - "tests/test_developed_campaign_proposals.py"
      - "tests/test_recovered_attempts.py"
      - ".github/workflows/work-map.yml"
  pull_request:
    paths:
      - ".vela/**"
      - "attack/attempt-ledger.v2.json"
      - "frontier.json"
      - "erdos_frontier.py"
      - "vela.lock"
      - "sources.yaml"
      - "sources.lock.json"
      - "sources/**"
      - "review/developed-campaign-proposals.v1.yaml"
      - "scripts/build_graph.py"
      - "scripts/build_recovered_attempt_ledger.py"
      - "scripts/build_work_inventory.py"
      - "scripts/import_recovered_attempts.py"
      - "graph/**"
      - "site/claim-graph.json"
      - "site/work-index.json"
      - "site/problems/**"
      - "tests/test_formal_conjectures_activity.py"
      - "tests/test_erdos_frontier.py"
      - "tests/test_work_inventory.py"
      - "tests/test_developed_campaign_proposals.py"
      - "tests/test_recovered_attempts.py"
      - ".github/workflows/work-map.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deterministic-projection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-groups
      - name: Reject stale or non-deterministic generated feeds
        run: uv run python scripts/build_work_inventory.py --check
      - name: Verify inventory, migration, graph, and proposal contracts
        run: >-
          uv run pytest -q
          tests/test_erdos_frontier.py
          tests/test_formal_conjectures_activity.py
          tests/test_work_inventory.py
          tests/test_developed_campaign_proposals.py
          tests/test_recovered_attempts.py
