name: Verify the signed frontier

# The git-native gate, via the shared action: on every change to the signed
# frontier, constellate-science/vela re-derives it from a clean checkout and
# proves the working tree IS the signed state (replay + hash parity). It NEVER
# signs: the human-key accept stays the reviewer's signed event in the repo.
on:
  push:
    branches: [main]
    paths:
      - ".vela/**"
      - "frontier.json"
      - "frontier.yaml"
      - "vela.lock"
      - "proof/**"
      - ".github/workflows/vela-frontier.yml"
  pull_request:
    paths:
      - ".vela/**"
      - "frontier.json"
      - "frontier.yaml"
      - "vela.lock"
      - "proof/**"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: constellate-science/vela@main
        with:
          # vela-version defaults to the vela_version pinned in vela.lock, so
          # the gating binary always matches the one that materialized state.
          # Non-strict since v0.745.0: the frontier now holds the full 1217-problem
          # corpus as declared-fact findings (agent-anchored, unreviewed by design —
          # catalog facts, not proof-bearing claims). `vela check` replay + signature
          # + parity still gate hard; only --strict proof-readiness (which reads the
          # 2676 unreviewed corpus findings as debt) is acknowledged and non-blocking.
          strict: "false"
