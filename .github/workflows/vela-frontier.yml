name: Verify the signed frontier

# The git-native gate: every main push and pull request runs the released Vela
# action. It re-derives state from a clean checkout and proves replay + hash
# parity. It never signs or supplies a scientific verdict.
on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: vela-science/vela@v0.800.9
        with:
          vela-version: v0.800.9
      - name: Reproduce every witness from scratch
        run: vela reproduce .
