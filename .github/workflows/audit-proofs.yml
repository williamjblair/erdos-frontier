name: Re-audit Lean proofs (heavy)

# The HEAVY half of the split: clone + build the proof repos at their own Lean
# toolchains, re-run the assumption-extractor, and commit the regenerated feeds.
# The daily update-status.yml job stays cheap (it only re-reads these feeds).
#
# Manual (workflow_dispatch). It builds TWO Mathlib toolchains from scratch: a
# validated dispatch reached [8346/8353] of the plby build (`lake exe cache get`
# fetched the Mathlib oleans fine) — the logic is sound, it just needs ~2h per
# toolchain, so the whole job runs ~4h cold. The fast, reliable path is LOCAL:
# with the proof repos cloned + built, `bash lean/reaudit.sh` finishes in minutes.
# Don't run this right before an external comms moment — if the fork moved since the
# last local audit, it will commit changed feeds (which is the point, just review them).
on:
  workflow_dispatch: {}

permissions:
  contents: write

# Share the daily job's group so the two never push to main concurrently.
concurrency:
  group: commit-to-main
  cancel-in-progress: false

jobs:
  reaudit:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # ~4h cold (two toolchains built from scratch) + margin
    steps:
      - uses: actions/checkout@v5

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      # Cache only the elan toolchains (modest, conflict-free). Mathlib oleans come
      # from `lake exe cache get`; the proof files themselves compile each run.
      # NOT caching proof-repos/.lake — it would be restored before the clone and
      # make `git clone` fail on a non-empty dir.
      - name: Cache the Lean toolchains
        uses: actions/cache@v4
        with:
          path: ~/.elan
          key: elan-${{ runner.os }}-v1
          restore-keys: elan-${{ runner.os }}-

      - name: Clone proof repos
        run: |
          mkdir -p proof-repos
          git clone --depth 1 https://github.com/williamjblair/lean-proofs-fork.git proof-repos/plby
          git clone --depth 1 https://github.com/google-deepmind/alphaproof-nexus-results.git proof-repos/alphaproof
          git clone --depth 1 https://github.com/Jayyhk/erdos-lean.git proof-repos/jayyhk

      # Build ONLY the ErdosProblems library (the aggregate ErdosProblems.All), not
      # the fork's default "All" target — that also pulls HundredTheorems / MathOverflow
      # / PrimeNumberTheoremAnd, which the extractor never reads and which only add
      # build time and failure surface.
      - name: Build plby fork ErdosProblems (Lean 4.29.1)
        working-directory: proof-repos/plby/src/v4.29.1
        run: |
          lake exe cache get || true
          lake build ErdosProblems.All

      - name: Build alphaproof-nexus (Lean 4.27.0)
        working-directory: proof-repos/alphaproof
        run: |
          lake exe cache get || true
          lake build APNOutputs

      # Jayyhk hosts one lake project per problem, each pinned to its own toolchain.
      # Build only the groups whose toolchain we already provisioned above (v4.29.1
      # for plby, v4.27.0 for alphaproof) so the Mathlib downloads are reused. The
      # other ~10 toolchain groups are a heavier, incremental follow-on.
      - name: Build Jayyhk groups matching plby/alphaproof (v4.29.1, v4.27.0)
        run: JAYYHK="$GITHUB_WORKSPACE/proof-repos/jayyhk" bash lean/build-jayyhk.sh v4.29.1 v4.27.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-groups

      - name: Run the multi-toolchain audit + regenerate feeds
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VELA_PROOF_REPO: ${{ github.workspace }}/proof-repos/plby/src/v4.29.1
          VELA_PROOF_REPO_ALPHAPROOF: ${{ github.workspace }}/proof-repos/alphaproof
          VELA_PROOF_REPO_JAYYHK: ${{ github.workspace }}/proof-repos/jayyhk
        run: |
          uv run python lean/extract_assumptions.py --repo plby
          uv run python lean/extract_assumptions.py --repo alphaproof
          uv run python lean/extract_assumptions.py --repo jayyhk
          uv run python erdos_frontier.py
          uv run python scripts/build_graph.py
          uv run pytest -q

      - name: Commit regenerated feeds if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lean/audit_feed*.json site/ graph/ sources.lock.json
          if git diff --staged --quiet; then
            echo "Audit feeds unchanged."
          else
            git commit -m "chore: re-audit proofs ($(date -u +%Y-%m-%d))"
            git pull --rebase origin main || true
            git push
          fi
