name: Web kit drift check

# The site's tokens.css / frontier-kit.css / fonts are vendored verbatim
# from constellate-science/vela (web/styles + web/fonts). This check fails
# when the vendored copies diverge from upstream at the ref recorded in
# site/assets/KIT_REV. To update: scripts/sync-web-kit.sh [ref], commit.

on:
  push:
    branches: [main]
    paths: [site/assets/**, .github/workflows/web-kit.yml]
  pull_request:
    paths: [site/assets/**]
  workflow_dispatch: {}

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare vendored kit against upstream
        run: |
          set -euo pipefail
          REF=$(awk '/^ref:/{print $2}' site/assets/KIT_REV)
          RAW="https://raw.githubusercontent.com/constellate-science/vela/${REF}"
          fail=0
          check() {
            src="$1"; dst="site/assets/$2"
            curl -fsSL "${RAW}/${src}" -o /tmp/upstream
            if ! cmp -s /tmp/upstream "$dst"; then
              echo "::error file=$dst::drifted from constellate-science/vela@${REF} ${src}"
              fail=1
            fi
          }
          check web/styles/tokens.css tokens.css
          check web/styles/frontier-kit.css frontier-kit.css
          check web/fonts/inter-latin-400-normal.woff2 fonts/inter-latin-400-normal.woff2
          check web/fonts/inter-latin-600-normal.woff2 fonts/inter-latin-600-normal.woff2
          check web/fonts/source-serif-4-latin-400-normal.woff2 fonts/source-serif-4-latin-400-normal.woff2
          check web/fonts/source-serif-4-latin-400-italic.woff2 fonts/source-serif-4-latin-400-italic.woff2
          check web/fonts/jetbrains-mono-latin-400-normal.woff2 fonts/jetbrains-mono-latin-400-normal.woff2
          check web/fonts/LICENSE.md fonts/LICENSE.md
          exit $fail
