# The sources this frontier reconciles. `sources.lock.json` records the exact
# content hash (and GitHub commit, where resolvable) of each at generation time,
# so accepted state is traceable to exact snapshots rather than a floating `main`
# (memo Gate 1 / Failure Mode 4). Regenerate the lock with:
#     python -c "import erdos_frontier as e; e.write_sources_lock('.')"
sources:
  erdos:
    kind: problem_registry
    repo: teorth/erdosproblems
    ref: main
    path: data/problems.yaml
    url: https://raw.githubusercontent.com/teorth/erdosproblems/main/data/problems.yaml

  formal_conjectures:
    kind: formal_statement_registry
    repo: google-deepmind/formal-conjectures
    url: https://google-deepmind.github.io/formal-conjectures/data/conjectures.json

  plby:
    kind: proof_manifest
    repo: plby/lean-proofs
    ref: main
    path: data/sources.yaml
    url: https://raw.githubusercontent.com/plby/lean-proofs/main/data/sources.yaml

  jayyhk:
    kind: proof_manifest
    repo: Jayyhk/erdos-lean
    ref: main
    path: data/problems.yaml
    url: https://raw.githubusercontent.com/Jayyhk/erdos-lean/main/data/problems.yaml

  williamjblair_lean_proofs:
    kind: proof_manifest
    repo: williamjblair/lean-proofs
    ref: main
    path: proofs.yaml
    url: https://raw.githubusercontent.com/williamjblair/lean-proofs/main/proofs.yaml

  # Statement-fidelity: this repo IS the git-native home (vfr_0a25edabc16db143);
  # the four signed vsa_ replay from .vela/ into frontier.json — no external fetch.
  fidelity:
    kind: statement_attestations
    home: "self (.vela/ -> frontier.json)"

  # Committed frozen snapshots, versioned in-repo (no live fetch).
  wiki:
    kind: frozen_snapshot
    repo: teorth/erdosproblems.wiki
    commit: c8ad4309d20120c67cb97faa86daa1443acee018
    path: sources/wiki/registry.json
    paths: [AI-contributions-to-Erdős-problems.md]
    note: the retired AI-contributions wiki (frozen 2026-06-30)
  gpt_erdos:
    kind: frozen_snapshot
    repo: neelsomani/gpt-erdos
    commit: 21b48ae6b97279e9fe6781e3744e1cdd835e2cc1
    path: sources/gpt_erdos/registry.json
    paths: [README.md]
