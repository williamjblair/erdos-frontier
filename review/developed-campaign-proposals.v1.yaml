        git_blob: b99032cc56df05fbab850cae696939b6994d2bd0
        sha256: sha256:225789a61204d875259b7f5ea0448ee4ea6cc6fe99864a4585f964fbd2ecb1f6
      conditions: >-
        Conditional k=2 infinitude only. The supply proposition is not proved, and
        the upstream statement quantifies over every fixed k >= 2.
    residuals:
      - proposal_key: erdos-727-explicit-dickson-ap12-supply
        disposition: propose
        assertion: >-
          ExplicitDicksonAP12PrimeTupleSupplyK2 is the still-open assertion that
          for every U there is u >= U for which 48(12u)+29, 76(12u)+65,
          38(12u)+23, and 48(12u)+41 are all prime; even this supplies only k=2,
          so the other fixed k >= 2 cases remain.
        source_claim:
          kind: lean_definition_and_docstring
          verbatim: >-
            This is the exact prime-tuple infinitude hypothesis isolated by the
            latest fixed-box downgrade. It is a proposition, not an axiom.
          definition: >-
            def ExplicitDicksonAP12PrimeTupleSupplyK2 : Prop :=
              ∀ U : ℕ, ∃ u : ℕ, U ≤ u ∧
                Nat.Prime (48 * (12 * u) + 29) ∧
                Nat.Prime (76 * (12 * u) + 65) ∧
                Nat.Prime (38 * (12 * u) + 23) ∧
                Nat.Prime (48 * (12 * u) + 41)
          path: ErdosProblems/Erdos727.lean
        activity: theorem
        mathematical_scope: conditional
        trust: recorded
