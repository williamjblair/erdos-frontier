campaigns:
  - problem: 23
    upstream_state: open
    claim:
      proposal_key: erdos-23-two-defect-internal-cost-closure
      disposition: propose
      assertion: >-
        At d equal to twice the slack minus two, fully nonbridge corridor geometry,
        the rooted cut condition, injective simple demand pairs, legality, and
        same-color endpoints imply the exact RL internal-cost budget across all five
        canonical two-defect shapes.
      source_claim:
        kind: proof_registry_statement
        verbatim: >-
          At d equal to twice the slack minus two, fully nonbridge corridor geometry,
          the rooted cut condition, injective simple demand pairs, legality, and
          same-color endpoints imply the exact RL internal-cost budget across all five
          canonical two-defect shapes.
      activity: theorem
      mathematical_scope: partial
      trust: lean_attested
      lifecycle: banked
      statement_fidelity:
        status: pending_human_review
        asserted_relation: partial_subcase
      machine_status:
        status: lean_attested
        review_reproduction: not_rerun
        axioms_clean: true
        axiom_footprint: [propext, Classical.choice, Quot.sound]
        attestation_proof_hash: sha256:bf4bb0e93a66a87b7e5a33eb03f954992d7c407d975cfc9e1202d8b6f3ad16e5
      artifact:
        path: ErdosProblems/Erdos23GapGBTwoDefectFinal.lean
        declaration: Erdos23GapGBTwoDefectFinal.totalCost_le_rlBudget_of_twoDefect_allNonbridge_sameSide
        git_blob: 7491da3b1463ac484d52780218f76cd5b18a329f
        sha256: sha256:bf4bb0e93a66a87b7e5a33eb03f954992d7c407d975cfc9e1202d8b6f3ad16e5
      conditions: >-
        This is the d = 2s - 2 all-nonbridge one-stub internal-cost closure. It is
        not the full Erdős 23 statement and does not discharge multi-stub or
        connected-core obligations.
    residuals:
      - proposal_key: erdos-23-post-two-defect-residual
        disposition: propose
        assertion: >-
          After the d = 2s - 2 closure, the one-stub all-nonbridge RL residual has
          5 <= s and d <= 2s - 3; the multi-stub pair inequality and the final
          connected or 2-connected core remain separate obligations.
        source_claim:
          kind: exact_derived_residual
          derivation: >-
            Remove the newly closed d = 2s - 2 row from the pinned prompt's
            all-nonbridge residual 5 <= s and d <= 2s - 2; retain its verbatim
            warning that multi-stub and connected-core obligations are separate.
          verbatim_inputs:
            - '5 ≤ s,   d ≤ 2s−2.'
            - >-
              It does not silently discharge the separate multi-stub or
              connected-core obligations.
          path: codex/prompt_23_rl_star.md
        activity: theorem
        mathematical_scope: partial
        trust: recorded
        lifecycle: active
        statement_fidelity:
          status: pending_human_review
          asserted_relation: remaining_obligation
        machine_status:
          status: derived_from_attested_boundary_and_recorded_reduction
          review_reproduction: not_rerun

